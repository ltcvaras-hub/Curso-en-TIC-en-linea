<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OVA - Empoderamiento de las TIC en Docentes de EBR</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        /* CONFIGURACIÓN GLOBAL */

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {

            font-family: 'Lato', sans-serif;

            background-color: #f0f4f8;

            color: #334155;

            display: flex;

            min-height: 100vh;

        }



        /* PALETA DE COLORES INSTITUCIONALES (TONOS AZULES Y DORADO ACCENTO) */

        :root {

            --primary-dark: #002b5c;     /* Azul Marino Oscuro */

            --primary-blue: #003366;     /* Azul Institucional */

            --secondary-blue: #1e40af;   /* Azul Eléctrico Curricular */

            --accent-gold: #D4AF37;      /* Dorado de la I.E. Leoncio Prado */

            --light-bg: #f8fafc;         /* Fondo claro para tarjetas */

            --text-dark: #1e293b;

            --text-muted: #64748b;

        }



        /* MENÚ DE NAVEGACIÓN LATERAL (TABS) */

        .sidebar {

            width: 280px;

            background-color: var(--primary-dark);

            color: white;

            display: flex;

            flex-direction: column;

            position: fixed;

            height: 100vh;

            left: 0;

            top: 0;

            z-index: 100;

            box-shadow: 4px 0 10px rgba(0,0,0,0.1);

        }



        .sidebar-header {

            padding: 25px 20px;

            background-color: #001f42;

            text-align: center;

            border-bottom: 2px solid var(--accent-gold);

        }



        .sidebar-header .logo-placeholder {

            width: 80px;

            height: 80px;

            background: white;

            border-radius: 50%;

            margin: 0 auto 10px;

            display: flex;

            align-items: center;

            justify-content: center;

            padding: 8px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.2);

        }



        .sidebar-header .logo-placeholder img {

            max-width: 100%;

            max-height: 100%;

            object-fit: contain;

        }



        .sidebar-header h2 {

            font-family: 'Poppins', sans-serif;

            font-size: 15px;

            font-weight: 600;

            color: white;

            line-height: 1.2;

        }



        .sidebar-header p {

            font-size: 11px;

            color: #94a3b8;

            margin-top: 4px;

        }



        .nav-tabs {

            list-style: none;

            display: flex;

            flex-direction: column;

            margin-top: 15px;

            flex-grow: 1;

        }



        .nav-item {

            padding: 15px 20px;

            cursor: pointer;

            display: flex;

            align-items: center;

            gap: 12px;

            font-size: 14px;

            font-weight: 600;

            transition: all 0.3s ease;

            border-left: 4px solid transparent;

            color: #cbd5e1;

        }



        .nav-item i {

            width: 20px;

            font-size: 16px;

            text-align: center;

        }



        .nav-item:hover {

            background-color: rgba(255, 255, 255, 0.05);

            color: white;

        }



        .nav-item.active {

            background-color: var(--primary-blue);

            color: white;

            border-left-color: var(--accent-gold);

        }



        /* CONTENEDOR PRINCIPAL */

        .main-content {

            margin-left: 280px;

            flex-grow: 1;

            padding: 40px;

            max-width: 1200px;

            width: calc(100% - 280px);

        }



        .tab-content {

            display: none;

            animation: fadeIn 0.5s ease-in-out;

        }



        .tab-content.active {

            display: block;

        }



        @keyframes fadeIn {

            from { opacity: 0; transform: translateY(10px); }

            to { opacity: 1; transform: translateY(0); }

        }



        /* COMPONENTES DE DISEÑO WEB PROFESIONAL */

        h1, h2, h3, h4 {

            font-family: 'Poppins', sans-serif;

            color: var(--primary-blue);

            margin-bottom: 15px;

        }



        p {

            line-height: 1.6;

            margin-bottom: 15px;

            text-align: justify;

        }



        .section-title {

            font-size: 28px;

            font-weight: 700;

            border-bottom: 3px solid var(--accent-gold);

            padding-bottom: 8px;

            margin-bottom: 25px;

            display: flex;

            align-items: center;

            gap: 10px;

        }



        /* PESTAÑA 1: INICIO / PORTADA */

        .hero-banner {

            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%);

            color: white;

            padding: 45px;

            border-radius: 16px;

            position: relative;

            overflow: hidden;

            box-shadow: 0 10px 25px rgba(0,0,0,0.1);

            margin-bottom: 30px;

        }



        .hero-banner::after {

            content: '';

            position: absolute;

            right: -50px;

            bottom: -50px;

            width: 300px;

            height: 300px;

            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);

            border-radius: 50%;

        }



        .hero-title {

            font-size: 34px;

            color: white;

            font-weight: 700;

            margin-bottom: 15px;

            line-height: 1.2;

        }



        .hero-purpose {

            background-color: rgba(255, 255, 255, 0.1);

            border-left: 4px solid var(--accent-gold);

            padding: 20px;

            border-radius: 0 8px 8px 0;

            margin-top: 20px;

            font-style: italic;

        }



        .welcome-card {

            background: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            margin-bottom: 30px;

            border-top: 4px solid var(--primary-blue);

        }



        .grid-metadata {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            margin-top: 25px;

        }



        .meta-box {

            background: var(--light-bg);

            padding: 20px;

            border-radius: 8px;

            text-align: center;

            border: 1px solid #e2e8f0;

        }



        .meta-box i {

            font-size: 28px;

            color: var(--primary-blue);

            margin-bottom: 10px;

        }



        .meta-box h4 {

            font-size: 14px;

            color: var(--text-muted);

            text-transform: uppercase;

            margin-bottom: 5px;

        }



        .meta-box p {

            font-size: 16px;

            font-weight: 600;

            color: var(--text-dark);

            text-align: center;

            margin-bottom: 0;

        }



        /* PESTAÑA 2: FORO DE DEBATE */

        .forum-container {

            background: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

        }



        .forum-section {

            background: var(--light-bg);

            padding: 25px;

            border-radius: 8px;

            margin-bottom: 25px;

            border-left: 4px solid var(--secondary-blue);

        }



        .forum-question {

            font-size: 18px;

            font-weight: 600;

            color: var(--primary-dark);

            line-height: 1.5;

            background: #fff;

            padding: 20px;

            border-radius: 8px;

            border: 1px solid #e2e8f0;

            margin-top: 15px;

        }



        .comment-box {

            margin-top: 20px;

        }



        .comment-box textarea {

            width: 100%;

            height: 120px;

            padding: 15px;

            border-radius: 8px;

            border: 1px solid #cbd5e1;

            font-family: inherit;

            resize: vertical;

            margin-bottom: 15px;

        }



        .btn {

            background-color: var(--primary-blue);

            color: white;

            padding: 12px 24px;

            border: none;

            border-radius: 6px;

            font-weight: 600;

            cursor: pointer;

            transition: background 0.3s;

            display: inline-flex;

            align-items: center;

            gap: 8px;

        }



        .btn:hover { background-color: var(--primary-dark); }

        .btn-gold { background-color: var(--accent-gold); color: var(--primary-dark); }

        .btn-gold:hover { background-color: #c59b27; color: white;}



        /* PESTAÑA 3: MARCO DE DESARROLLO (MÓDULOS) */

        .module-accordion {

            display: flex;

            flex-direction: column;

            gap: 20px;

        }



        .module-card {

            background: white;

            border-radius: 12px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            overflow: hidden;

            border-top: 4px solid var(--primary-blue);

        }



        .module-header {

            background: var(--light-bg);

            padding: 20px 25px;

            display: flex;

            justify-content: space-between;

            align-items: center;

            cursor: pointer;

        }



        .module-header h3 { margin-bottom: 0; font-size: 18px; }



        .module-body {

            padding: 25px;

            border-top: 1px solid #e2e8f0;

        }



        .subtheme-box {

            background: #f1f5f9;

            padding: 15px 20px;

            border-radius: 8px;

            margin-top: 15px;

        }



        .subtheme-box h4 {

            font-size: 15px;

            color: var(--secondary-blue);

            margin-bottom: 8px;

            display: flex;

            align-items: center;

            gap: 8px;

        }



        .conclusions-box {

            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);

            padding: 30px;

            border-radius: 12px;

            margin-top: 40px;

            border: 1px solid #bfdbfe;

        }



        .conclusions-list {

            list-style: none;

            margin-top: 15px;

        }



        .conclusions-list li {

            position: relative;

            padding-left: 30px;

            margin-bottom: 15px;

            line-height: 1.6;

        }



        .conclusions-list li::before {

            content: '\f0a4';

            font-family: 'Font Awesome 6 Free';

            font-weight: 900;

            position: absolute;

            left: 0;

            top: 2px;

            color: var(--accent-gold);

            font-size: 18px;

        }



        /* PESTAÑA 4: REPOSITORIO SEMANAL */

        .repo-table {

            width: 100%;

            border-collapse: collapse;

            background: white;

            border-radius: 12px;

            overflow: hidden;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            margin-top: 20px;

        }



        .repo-table th {

            background-color: var(--primary-blue);

            color: white;

            padding: 18px;

            text-align: left;

            font-family: 'Poppins', sans-serif;

            font-weight: 600;

        }



        .repo-table td {

            padding: 20px;

            border-bottom: 1px solid #e2e8f0;

            vertical-align: top;

        }



        .upload-zone {

            border: 2px dashed #cbd5e1;

            padding: 15px;

            border-radius: 8px;

            text-align: center;

            background: var(--light-bg);

            cursor: pointer;

            transition: all 0.3s;

            margin-top: 10px;

        }



        .upload-zone:hover {

            border-color: var(--secondary-blue);

            background: #eff6ff;

        }



        .upload-zone i {

            font-size: 24px;

            color: var(--text-muted);

            margin-bottom: 5px;

        }



        .file-tags {

            display: flex;

            gap: 5px;

            margin-top: 8px;

            flex-wrap: wrap;

        }



        .badge-format {

            font-size: 11px;

            padding: 3px 8px;

            border-radius: 4px;

            font-weight: bold;

            color: white;

        }

        .bg-pdf { background-color: #ef4444; }

        .bg-word { background-color: #3b82f6; }

        .bg-ppt { background-color: #f97316; }



        /* PESTAÑA 5: ACTIVIDADES LÚDICAS INTERACTIVAS */

        .games-grid {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

            gap: 25px;

        }



        .game-card {

            background: white;

            border-radius: 12px;

            padding: 25px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            border-left: 5px solid var(--accent-gold);

            display: flex;

            flex-direction: column;

            justify-content: space-between;

        }



        .game-card h3 {

            font-size: 18px;

            color: var(--primary-dark);

            display: flex;

            align-items: center;

            gap: 10px;

        }



        .game-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 15px; }



        /* Elementos de Juego */

        .game-interactive-area {

            background: var(--light-bg);

            padding: 15px;

            border-radius: 8px;

            margin-bottom: 15px;

            border: 1px solid #e2e8f0;

        }

        .drag-item {

            background: white;

            padding: 8px 12px;

            border: 1px solid #cbd5e1;

            border-radius: 4px;

            cursor: grab;

            margin-bottom: 8px;

            font-size: 13px;

            display: flex;

            align-items: center;

            gap: 8px;

        }

        .drop-zone-container {

            display: flex;

            flex-direction: column;

            gap: 8px;

            margin-top: 10px;

        }

        .drop-target {

            background: #fff;

            border: 2px dashed #94a3b8;

            padding: 10px;

            border-radius: 6px;

            font-size: 13px;

            min-height: 40px;

        }

        .drop-target.hovered {

            border-color: var(--secondary-blue);

            background: #eff6ff;

        }

        .game-feedback {

            font-size: 13px;

            font-weight: 600;

            margin-top: 10px;

            padding: 8px;

            border-radius: 4px;

            display: none;

        }

        .feedback-success { background: #dcfce7; color: #15803d; }

        .feedback-error { background: #fee2e2; color: #b91c1c; }



        /* PESTAÑA 6: CUESTIONARIO AUTOEVALUADO */

        .quiz-container {

            background: white;

            padding: 35px;

            border-radius: 12px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

        }



        .quiz-question {

            margin-bottom: 30px;

            padding-bottom: 20px;

            border-bottom: 1px solid #f1f5f9;

        }



        .quiz-question h4 { font-size: 16px; color: var(--text-dark); margin-bottom: 12px; }



        .quiz-options {

            display: flex;

            flex-direction: column;

            gap: 10px;

            margin-left: 10px;

        }
